<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLab AI Economics - Dashboard & Calculadora</title>
    <!-- React & Tailwind via CDN para ejecución standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Usar Babel Standalone V7 para soportar sintaxis moderna de ES6 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .glass-panel { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(39, 39, 42, 1); }
        .custom-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: #27272a;
            border-radius: 5px;
            outline: none;
        }
        .custom-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            transition: all 0.2s;
        }
        .custom-range::-webkit-slider-thumb:hover { background: #60a5fa; transform: scale(1.2); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center selection:bg-blue-500/30">
    <div id="calculator-root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PRICING = {
            'gemini-2.5-flash-lite': { name: 'Gemini 2.5 Flash-Lite (Optimizado)', in: 0.075, out: 0.30, icon: '⚡' },
            'gemini-2.5-flash': { name: 'Gemini 2.5 Flash (Estándar)', in: 0.15, out: 0.60, icon: '🔥' },
            'gemini-1.5-pro': { name: 'Gemini 1.5 Pro (Evaluación Profunda)', in: 1.25, out: 5.00, icon: '🚀' }
        };

        function App() {
            // Estado y Variables de Simulación
            const [students, setStudents] = useState(28);
            const [exercises, setExercises] = useState(20);
            const [avgAttempts, setAvgAttempts] = useState(5);
            const [cacheHitRate, setCacheHitRate] = useState(20); // 20%
            const [selectedModel, setSelectedModel] = useState('gemini-2.5-flash-lite');
            
            // Consumo de Tokens Promedio
            const [inputTokens, setInputTokens] = useState(250); // Prompt acortado
            const [outputTokens, setOutputTokens] = useState(70); // Feedback corto obligado
            
            // Cálculos Derivados
            const totalIntentosTeoricos = students * exercises * avgAttempts;
            const intentosAhorradosPorCache = Math.floor(totalIntentosTeoricos * (cacheHitRate / 100));
            const llamadasApiTasaEfectiva = totalIntentosTeoricos - intentosAhorradosPorCache;

            const totalTokensEntrada = llamadasApiTasaEfectiva * inputTokens;
            const totalTokensSalida = llamadasApiTasaEfectiva * outputTokens;

            const costoEntradaData = (totalTokensEntrada / 1000000) * PRICING[selectedModel].in;
            const costoSalidaData = (totalTokensSalida / 1000000) * PRICING[selectedModel].out;
            const costoTotalEstimado = costoEntradaData + costoSalidaData;

            // Comparativa sin optimizaciones
            const llamadasSinCache = totalIntentosTeoricos;
            const costoEntradaSinCache = (llamadasSinCache * inputTokens / 1000000) * PRICING[selectedModel].in;
            const costoSalidaSinCache = (llamadasSinCache * outputTokens / 1000000) * PRICING[selectedModel].out;
            const costoSinOptimizar = costoEntradaSinCache + costoSalidaSinCache;
            const ahorroMonetario = costoSinOptimizar - costoTotalEstimado;

            // Formateadores
            const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 4, maximumFractionDigits: 4 }).format(val);
            const formatNumber = (val) => new Intl.NumberFormat('es-CO').format(val);

            return (
                <div className="space-y-6 animate-fadeIn">
                    {/* ENCABEZADO */}
                    <header className="mb-10 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-6">
                        <div>
                            <h1 className="text-3xl font-black tracking-tight flex items-center gap-3">
                                <span className="text-blue-500">Dev</span>Lab <span className="text-gray-500 font-light">AI Economics Center</span>
                            </h1>
                            <p className="text-gray-400 text-sm mt-2 max-w-xl">
                                Simulador financiero "Out-of-band" para proyectar de forma precisa el impacto del LTI, la concurrencia de estudiantes y la optimización de cachés sin tocar código de backend.
                            </p>
                        </div>
                        <div className="bg-blue-500/10 border border-blue-500/20 text-blue-400 px-4 py-2 rounded-lg font-mono text-sm shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                            Modelo Seleccionado: <strong className="text-blue-300">{PRICING[selectedModel].icon} {PRICING[selectedModel].name}</strong>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* PANEL DE CONTROLES: Izquierda (8 columnas) */}
                        <div className="lg:col-span-8 space-y-6">
                            
                            {/* DEMOGRAFÍA & USO */}
                            <div className="glass-panel rounded-2xl p-6">
                                <h3 className="text-xs font-bold uppercase tracking-widest text-gray-500 mb-6 flex items-center gap-2">
                                    🎓 Demografía y Retención LTI
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="space-y-2">
                                        <div className="flex justify-between items-end">
                                            <label className="text-sm font-medium text-gray-300">Número de Coders (Estudiantes)</label>
                                            <span className="text-xl font-bold text-blue-400">{formatNumber(students)}</span>
                                        </div>
                                        <input type="range" min="1" max="1000" value={students} onChange={(e) => setStudents(Number(e.target.value))} className="custom-range" />
                                        <div className="flex justify-between text-[10px] text-gray-600 font-mono"><span>1</span><span>1000 MAX</span></div>
                                    </div>
                                    
                                    <div className="space-y-2">
                                        <div className="flex justify-between items-end">
                                            <label className="text-sm font-medium text-gray-300">Ejercicios por Módulo</label>
                                            <span className="text-xl font-bold text-blue-400">{exercises}</span>
                                        </div>
                                        <input type="range" min="1" max="100" value={exercises} onChange={(e) => setExercises(Number(e.target.value))} className="custom-range" />
                                        <div className="flex justify-between text-[10px] text-gray-600 font-mono"><span>1</span><span>100 MAX</span></div>
                                    </div>
                                    
                                    <div className="space-y-2">
                                        <div className="flex justify-between items-end">
                                            <label className="text-sm font-medium text-gray-300">Intentos "Validar IA" por Ejercicio</label>
                                            <span className="text-xl font-bold text-orange-400">{avgAttempts}</span>
                                        </div>
                                        <input type="range" min="1" max="50" value={avgAttempts} onChange={(e) => setAvgAttempts(Number(e.target.value))} className="custom-range" />
                                        <p className="text-[10px] text-gray-500 mt-1">¿Cuántas veces le dan al botón para corregir antes de lograrlo?</p>
                                    </div>

                                    <div className="space-y-2">
                                        <div className="flex justify-between items-end">
                                            <label className="text-sm font-medium text-gray-300">Eficacia del Caché (%)</label>
                                            <span className="text-xl font-bold text-green-400">{cacheHitRate}%</span>
                                        </div>
                                        <input type="range" min="0" max="80" value={cacheHitRate} onChange={(e) => setCacheHitRate(Number(e.target.value))} className="custom-range" />
                                        <p className="text-[10px] text-gray-500 mt-1">Llamadas atajadas por memoria local (sin cambios en código).</p>
                                    </div>
                                </div>
                            </div>

                            {/* CONFIGURACIÓN DE MODELO E INTELIGENCIA ARTIFICIAL */}
                            <div className="glass-panel rounded-2xl p-6">
                                <h3 className="text-xs font-bold uppercase tracking-widest text-gray-500 mb-6 flex items-center gap-2">
                                    🧠 Configuración de Inferencia (Tokens)
                                </h3>
                                <div className="space-y-6">
                                    <div className="flex flex-col gap-2">
                                        <label className="text-sm font-medium text-gray-300">Motor de IA a Proyectar</label>
                                        <select 
                                            value={selectedModel} 
                                            onChange={(e) => setSelectedModel(e.target.value)}
                                            className="w-full bg-[#0f0f11] border border-gray-700 rounded-lg p-3 text-white outline-none focus:border-blue-500 transition-colors cursor-pointer"
                                        >
                                            {Object.keys(PRICING).map(k => (
                                                <option key={k} value={k}>{PRICING[k].icon} {PRICING[k].name} (In: ${PRICING[k].in}/M | Out: ${PRICING[k].out}/M)</option>
                                            ))}
                                        </select>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4 border-t border-gray-800">
                                        <div className="space-y-2">
                                            <div className="flex justify-between items-end">
                                                <label className="text-sm font-medium text-gray-300">Promedio Input Tokens</label>
                                                <span className="text-lg font-bold text-purple-400">{inputTokens}</span>
                                            </div>
                                            <input type="range" min="50" max="2500" step="50" value={inputTokens} onChange={(e) => setInputTokens(Number(e.target.value))} className="custom-range" />
                                            <div className="flex justify-between text-[10px] text-gray-600 font-mono"><span>Corto</span><span>Extenso</span></div>
                                        </div>
                                        <div className="space-y-2">
                                            <div className="flex justify-between items-end">
                                                <label className="text-sm font-medium text-gray-300">Promedio Output Tokens</label>
                                                <span className="text-lg font-bold text-purple-400">{outputTokens}</span>
                                            </div>
                                            <input type="range" min="30" max="800" step="10" value={outputTokens} onChange={(e) => setOutputTokens(Number(e.target.value))} className="custom-range" />
                                            <div className="flex justify-between text-[10px] text-gray-600 font-mono"><span>Conciso</span><span>Verborrágico</span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                        {/* PANEL DE RESULTADOS / DASHBOARD : Derecha (4 columnas) */}
                        <div className="lg:col-span-4 space-y-6 flex flex-col">
                            
                            {/* TARJETA MAESTRA DE COSTO */}
                            <div className="relative overflow-hidden glass-panel rounded-2xl p-6 bg-gradient-to-br from-indigo-900/20 to-blue-900/20 border-blue-500/20 flex-1 flex flex-col justify-center shadow-lg">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 blur-3xl rounded-full"></div>
                                <h3 className="text-xs font-bold uppercase tracking-widest text-blue-300/70 mb-2">Costo Total Proyectado</h3>
                                <div className="text-5xl font-black tracking-tighter text-white mb-2" style={{ textShadow: '0 0 20px rgba(59, 130, 246, 0.4)' }}>
                                    {formatCurrency(costoTotalEstimado)}
                                </div>
                                <p className="text-xs text-blue-200/50">Por ciclo/módulo configurado</p>
                                
                                <div className="mt-8 space-y-3 relative z-10">
                                    <div className="flex justify-between items-center bg-black/30 p-3 rounded-lg border border-white/5">
                                        <span className="text-sm text-gray-400">Tokens Procesados (Real)</span>
                                        <span className="font-mono text-sm font-bold text-white">{formatNumber(totalTokensEntrada + totalTokensSalida)}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-black/30 p-3 rounded-lg border border-white/5">
                                        <span className="text-sm text-gray-400">Peticiones Evitadas</span>
                                        <span className="font-mono text-sm font-bold text-green-400">{formatNumber(intentosAhorradosPorCache)} ops ({cacheHitRate}%)</span>
                                    </div>
                                </div>
                            </div>

                            {/* MÉTRICAS SECUNDARIAS */}
                            <div className="glass-panel rounded-2xl p-6 space-y-5 flex-1 flex flex-col justify-between">
                                <h3 className="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2">Desglose de Facturación</h3>
                                
                                <div className="space-y-4">
                                    <div>
                                        <div className="flex justify-between mb-1">
                                            <span className="text-xs text-gray-400">Input (Lectura Prompts)</span>
                                            <span className="text-xs font-bold text-gray-200">{formatCurrency(costoEntradaData)}</span>
                                        </div>
                                        <div className="w-full bg-gray-800 rounded-full h-1.5"><div className="bg-blue-500 h-1.5 rounded-full" style={{ width: `${(costoEntradaData/costoTotalEstimado*100) || 0}%` }}></div></div>
                                    </div>
                                    
                                    <div>
                                        <div className="flex justify-between mb-1">
                                            <span className="text-xs text-gray-400">Output (Respuestas Generadas)</span>
                                            <span className="text-xs font-bold text-gray-200">{formatCurrency(costoSalidaData)}</span>
                                        </div>
                                        <div className="w-full bg-gray-800 rounded-full h-1.5"><div className="bg-purple-500 h-1.5 rounded-full" style={{ width: `${(costoSalidaData/costoTotalEstimado*100) || 0}%` }}></div></div>
                                    </div>
                                </div>

                                <div className="pt-5 border-t border-gray-800 mt-auto">
                                    <div className="bg-green-500/10 border border-green-500/20 rounded-xl p-4 flex items-center justify-between">
                                        <div>
                                            <div className="text-[10px] text-green-400/80 font-bold uppercase tracking-wider mb-1">Ahorro por Caché</div>
                                            <div className="text-green-400 font-bold text-lg">{formatCurrency(ahorroMonetario)}</div>
                                        </div>
                                        <svg className="w-8 h-8 text-green-500/50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                    
                    <footer className="text-center pt-8 text-xs text-gray-600 border-t border-gray-800 flex flex-col md:flex-row justify-between items-center gap-4">
                        <p>Las tarifas simuladas están basadas en los modelos Gemini Cloud 2024-2026. Precios en USD.</p>
                        <p className="font-mono">DevLab AI Economics / Creador por Antigravity</p>
                    </footer>
                </div>
            );
        }

        const rootElement = document.getElementById('calculator-root');
        if (ReactDOM.createRoot) {
            ReactDOM.createRoot(rootElement).render(<App />);
        } else {
            ReactDOM.render(<App />, rootElement);
        }
    </script>
</body>
</html>
